<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개발자 포트폴리오</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <span class="logo">박재형</span>
      <nav class="nav">
        <a href="#about">About</a>
        <a href="#notion">Portfolio</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="about" class="hero">
      <p class="eyebrow">개발자 포트폴리오</p>
      <h1>안녕하세요, 저는 <span class="highlight">박재형</span>입니다.</h1>
      <p class="subtitle">한 줄 소개를 여기에 적어주세요. 예: 사용자 경험을 고민하는 프론트엔드 개발자입니다.</p>
      <a class="cta" href="#notion">포트폴리오 보기 ↓</a>
    </section>

    <section id="notion" class="notion-section">
      <div class="section-heading">
        <h2>Portfolio</h2>
      </div>

      <a class="notion-card" id="notion-card" href="#" target="_blank" rel="noopener">
        <div class="notion-card-icon">📄</div>
        <div class="notion-card-text">
          <p class="notion-card-title" id="notion-card-title">Notion 포트폴리오</p>
          <p class="notion-card-sub" id="notion-card-sub">아직 노션 페이지가 연결되지 않았어요. script.js의 NOTION_URL을 채워주세요.</p>
        </div>
        <div class="notion-card-arrow">↗</div>
      </a>
    </section>

    <section id="contact" class="contact">
      <h2>Contact</h2>
      <div class="links">
        <a href="mailto:you@example.com">Email</a>
        <a href="https://github.com/yourname" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/yourname" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 박재형. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
